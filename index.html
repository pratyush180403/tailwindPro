<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen p-4">
    <div class="bg-gray-800 rounded-xl p-8 shadow-2xl max-w-sm w-full border border-gray-700">
        <h2 class="text-center text-3xl text-white mb-6 font-extrabold tracking-tight">Login</h2>
        
        <form>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-2" for="email">Email</label>
                <input 
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" 
                    type="email" 
                    id="email" 
                    placeholder="name@company.com"
                    required
                >   
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2" for="password">Password</label>
                <input 
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" 
                    type="password" 
                    id="password" 
                    placeholder="••••••••"
                    required
                >   
            </div>

            <button 
                class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-500 active:transform active:scale-95 transition-all duration-200 shadow-lg" 
                type="submit">
                Sign In
            </button>
        </form>
        
        <p class="text-center text-gray-500 text-sm mt-6">
            Don't have an account? <a href="#" class="text-blue-400 hover:underline">Create one</a>
        </p>
    </div>
</body>
</html>
